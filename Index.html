<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#17191C" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Training Log</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@800;900&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --ink: #17191C;
  --paper: #F1F2EE;
  --line: #D6D8D2;
  --signal: #FF4D00;
  --steel: #6B7178;
  --card: #FFFFFF;
}

body {
  min-height: 100vh;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Archivo', system-ui, sans-serif;
  font-size: 16px;
}
body.dark { background: var(--ink); color: var(--paper); }

.screen { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }

/* --- Masthead --- */
.masthead { padding: 8px 4px 20px; border-bottom: 3px solid var(--ink); position: relative; }
.eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--steel); margin-bottom: 6px; }
.masthead h1 { font-family: 'Archivo Expanded', 'Archivo', sans-serif; font-weight: 900; font-size: 44px; line-height: 0.95; text-transform: uppercase; letter-spacing: -0.01em; }
.week-count { position: absolute; right: 4px; bottom: 20px; display: flex; align-items: center; gap: 8px; }
.week-num { font-family: 'Archivo Expanded', sans-serif; font-weight: 900; font-size: 40px; color: var(--signal); line-height: 1; }
.week-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--steel); line-height: 1.3; }

/* --- Week selector --- */
.week-select { margin-top: 16px; }
.week-select h2 { font-family: 'IBM Plex Mono', monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--steel); margin-bottom: 8px; }
.week-chips { display: flex; gap: 6px; }
.week-chip {
  flex: 1; height: 44px; border-radius: 4px; border: 1.5px solid var(--ink);
  background: var(--card); font-family: 'IBM Plex Mono', monospace; font-weight: 600;
  font-size: 15px; cursor: pointer; color: var(--ink); transition: all 0.1s ease;
}
.week-chip-on { background: var(--signal); border-color: var(--signal); color: #fff; }
.week-chip:focus-visible { outline: 3px solid var(--signal); outline-offset: 2px; }
.week-note { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--steel); margin-top: 6px; }

/* --- Day cards --- */
.cards { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
.day-card {
  display: flex; align-items: center; gap: 14px; width: 100%; text-align: left;
  background: var(--card); border: 1.5px solid var(--ink); border-radius: 4px;
  padding: 14px; cursor: pointer; transition: transform 0.08s ease;
  font-family: inherit; color: inherit; font-size: inherit;
}
.day-card:active { transform: scale(0.985); }
.day-card:focus-visible { outline: 3px solid var(--signal); outline-offset: 2px; }
.plate {
  flex: none; width: 52px; height: 52px; border-radius: 50%;
  background: var(--ink); color: var(--paper);
  font-family: 'Archivo Expanded', sans-serif; font-weight: 900; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  border: 3px solid var(--ink); box-shadow: inset 0 0 0 3px var(--paper);
}
.day-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.day-name { font-weight: 700; font-size: 18px; text-transform: uppercase; letter-spacing: 0.02em; }
.day-sub { font-size: 13px; color: var(--steel); }
.day-variant { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--signal); margin-top: 2px; }
.day-last { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--steel); }
.go { font-size: 20px; }

/* --- History --- */
.history { margin-top: 28px; }
.history h2 { font-family: 'IBM Plex Mono', monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--steel); margin-bottom: 8px; }
.history ul { list-style: none; }
.history li { display: flex; gap: 12px; padding: 8px 4px; border-bottom: 1px solid var(--line); font-size: 14px; align-items: baseline; }
.h-date { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--steel); flex: none; width: 105px; }
.h-name { font-weight: 600; }
.h-var { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--steel); }
.h-abs { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--signal); margin-left: auto; }

.footnote { margin-top: 28px; font-size: 12px; color: var(--steel); line-height: 1.5; text-align: center; }

/* --- Topbar --- */
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.topbar-title { font-family: 'Archivo Expanded', sans-serif; font-weight: 900; text-transform: uppercase; font-size: 16px; }
.topbar-pct { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: var(--signal); }
.link-btn { background: none; border: none; font-family: inherit; font-size: 14px; font-weight: 600; color: inherit; cursor: pointer; padding: 6px; }
.link-btn.subtle { color: var(--steel); font-weight: 500; }
.link-btn:focus-visible { outline: 3px solid var(--signal); outline-offset: 2px; }

.progress-rail { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
.progress-fill { height: 100%; background: var(--signal); transition: width 0.25s ease; }

.variant-banner {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--steel);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px;
}
.variant-banner strong { color: var(--signal); }

/* --- Blocks --- */
.block { background: var(--card); border: 1.5px solid var(--ink); border-radius: 4px; padding: 14px; margin-bottom: 12px; }
.block-done { border-color: var(--line); }
.block-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; gap: 8px; }
.block-head-btn {
  width: 100%; background: none; border: none; font-family: inherit; font-size: inherit;
  color: inherit; cursor: pointer; text-align: left; padding: 0; margin-bottom: 0;
}
.block-done .block-head-btn { margin-bottom: 0; }
.block-done .block-head-btn[aria-expanded="true"] { margin-bottom: 8px; }
.stretch-block .block-head-btn[aria-expanded="true"] { margin-bottom: 8px; }
.block-head h2 { font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
.block-check { color: var(--signal); }
.block-done h2 { color: var(--steel); }
.block-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--steel); text-align: right; }
.stretch-block { border-style: dashed; }
.stretch-block .block-head { margin-bottom: 10px; }
.stretch-block.block-done .block-head { margin-bottom: 0; }
.stretch-head-row { align-items: center; }
.stretch-again { padding: 0; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
.stretch-timer-btn {
  width: 100%; background: var(--paper); border: 1.5px solid var(--ink); border-radius: 4px;
  font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 14px;
  padding: 11px; cursor: pointer; color: var(--ink); margin-top: 4px;
}
.stretch-timer-btn:focus-visible { outline: 3px solid var(--signal); outline-offset: 2px; }
.ex-list { list-style: none; margin-bottom: 12px; }
.ex-item { border-bottom: 1px dashed var(--line); }
.ex-item:last-child { border-bottom: none; }
.ex-row {
  display: flex; justify-content: space-between; gap: 10px; padding: 7px 0;
  font-size: 14px; width: 100%; text-align: left; background: none; border: none;
  font-family: inherit; color: inherit; cursor: pointer;
}
.ex-row:focus-visible { outline: 3px solid var(--signal); outline-offset: 2px; }
.ex-q {
  display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--steel);
  color: var(--steel); font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  vertical-align: 1px;
}
.ex-desc {
  font-size: 13px; color: var(--steel); line-height: 1.5;
  padding: 0 4px 10px; border-left: 3px solid var(--signal); padding-left: 10px;
  margin: 0 0 8px;
}
.ex-name { font-weight: 500; }
.ex-detail { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--steel); text-align: right; flex: none; }
.rounds { display: flex; gap: 8px; flex-wrap: wrap; }
.round {
  width: 46px; height: 46px; border-radius: 4px; border: 1.5px solid var(--ink);
  background: var(--paper); font-family: 'IBM Plex Mono', monospace; font-weight: 600;
  font-size: 16px; cursor: pointer; color: var(--ink); transition: all 0.1s ease;
}
.round-on { background: var(--ink); color: var(--paper); }
.round:focus-visible { outline: 3px solid var(--signal); outline-offset: 2px; }

/* --- Finish zone / rest dock --- */
.finish-zone { display: flex; flex-direction: column; gap: 8px; align-items: stretch; margin-top: 6px; }
.primary {
  background: var(--signal); color: #fff; border: none; border-radius: 4px;
  font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 16px;
  padding: 15px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.03em;
  text-align: center; text-decoration: none; display: block;
}
.primary:active { filter: brightness(0.92); }
.primary:focus-visible { outline: 3px solid var(--ink); outline-offset: 2px; }
.primary-soft { background: var(--ink); }
.finish-zone .link-btn { align-self: center; }

.rest-dock {
  position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; z-index: 10;
}
.rest-btn {
  background: var(--ink); color: var(--paper); border: none; border-radius: 999px;
  font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 14px;
  padding: 12px 20px; cursor: pointer; box-shadow: 0 4px 14px rgba(23,25,28,0.3);
}
.rest-live { background: var(--signal); font-size: 13px; }
.rest-count { font-size: 20px; font-weight: 700; margin-right: 8px; }
.dock-spacer { height: 70px; }

/* --- Abs screens --- */
.light { color: var(--paper) !important; }

.video-link {
  display: flex; align-items: center; gap: 14px; width: 100%;
  background: var(--ink); color: var(--paper); border-radius: 4px;
  padding: 14px; text-decoration: none; margin-bottom: 12px;
  transition: transform 0.08s ease;
}
.video-link:active { transform: scale(0.985); }
.video-link:focus-visible { outline: 3px solid var(--signal); outline-offset: 2px; }
.video-play {
  flex: none; width: 44px; height: 44px; border-radius: 50%;
  background: var(--signal); color: #fff; font-size: 17px;
  display: flex; align-items: center; justify-content: center;
}
.video-link-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.video-link-name { font-weight: 700; font-size: 16px; text-transform: uppercase; letter-spacing: 0.02em; }
.video-link-sub { font-size: 12px; color: rgba(241,242,238,0.65); }
.video-link .go { color: var(--paper); }

.abs-block .ex-row { padding: 10px 0; }
.abs-block .ex-name { font-size: 15px; }
.abs-block .ex-detail { font-size: 13px; }
.abs-num-label {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--paper); border: 1.5px solid var(--ink);
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600;
  margin-right: 4px; vertical-align: -4px;
}

.abs-stage { max-width: 480px; margin: 0 auto; text-align: center; padding: 14px 0 8px; }
.abs-kind { font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: 0.2em; color: var(--signal); font-weight: 600; }
.abs-name { font-family: 'Archivo Expanded', sans-serif; font-weight: 900; font-size: 26px; text-transform: uppercase; margin: 8px 0 10px; min-height: 32px; color: var(--ink); }
.abs-cue {
  max-width: 340px; margin: 0 auto 18px; font-size: 15px;
  color: #3A3F45; line-height: 1.55; min-height: 20px;
}
.abs-clock {
  width: 180px; height: 180px; margin: 0 auto; border-radius: 50%;
  background: conic-gradient(var(--signal) var(--ring), rgba(23,25,28,0.12) 0);
  display: flex; align-items: center; justify-content: center;
}
.abs-clock span {
  width: 150px; height: 150px; border-radius: 50%; background: var(--ink); color: var(--paper);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Archivo Expanded', sans-serif; font-weight: 900; font-size: 56px;
}
.abs-next { margin-top: 16px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--steel); font-weight: 600; }
.abs-list { max-width: 480px; margin: 20px auto 0; list-style: none; columns: 2; gap: 12px; padding: 0 8px; }
.abs-list li { font-size: 14px; padding: 5px 0; color: #3A3F45; break-inside: avoid; }
.abs-list .abs-past { text-decoration: line-through; color: var(--line); }
.abs-list .abs-now { color: var(--signal); font-weight: 700; }

.video-launch { max-width: 480px; margin: 20px auto 0; display: flex; flex-direction: column; gap: 10px; align-items: stretch; text-align: center; }
.video-hint { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: rgba(241,242,238,0.6); line-height: 1.6; }
.abs-controls { max-width: 480px; margin: 20px auto 0; display: flex; flex-direction: column; gap: 6px; align-items: center; }
.abs-controls .primary { width: 100%; max-width: 300px; }

/* --- Done --- */
.done-screen { text-align: center; padding-top: 80px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
.done-stamp {
  width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--signal);
  color: var(--signal); font-size: 44px; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
}
.done-title { font-family: 'Archivo Expanded', sans-serif; font-weight: 900; font-size: 30px; text-transform: uppercase; }
.done-sub { color: var(--steel); font-size: 15px; max-width: 300px; }
.done-screen .primary { margin-top: 10px; min-width: 260px; }

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; }
}
</style>
</head>

<div id="app" class="screen"></div>

<script>
/* ================= 6-week program data =================
   Each day type has 3 variants (A, B, C) that rotate weekly:
   Week 1→A, 2→B, 3→C, 4→A+, 5→B+, 6→C+

  { id: "push",  name: "Push",       tag: "P1", subtitle: "Chest · Shoulders · Triceps" },

      { name: "Superset C", rounds: 3, rest: "30–45 sec", exercises: [
        { name: "Seated DB Shoulder Press (slow)", detail: "10 reps · 20–25 lbs" },

      { name: "Finisher", rounds: 3, rest: "30 sec", exercises: [

  pull: [

    ]},
    { label: "B", blocks: [
      { name: "Superset A", rounds: 4, rest: "30–45 sec", exercises: [

      { name: "Superset B", rounds: 3, rest: "30–45 sec", exercises: [

/* ================= Program logic ================= */

function weekVariant(dayId, week) {
  const base = VARIANTS[dayId][(week - 1) % 3];
  const progressed = week >= 4;
  if (!progressed) return { label: base.label, blocks: base.blocks, progressed: false };
  // Weeks 4–6: same variant, +1 round on Superset A
  const blocks = base.blocks.map((b, i) =>
    i === 0 ? Object.assign({}, b, { rounds: b.rounds + 1 }) : b
  );
  return { label: base.label + "+", blocks: blocks, progressed: true };
}

/* ================= Storage ================= */

const memStore = {};
function loadKey(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw !== null ? JSON.parse(raw) : fallback;
  } catch (e) {
    return memStore[key] !== undefined ? memStore[key] : fallback;
  }
}
function saveKey(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {
    memStore[key] = value;
  }
}

const state = {
  screen: "home",       // home | workout | abs | done
  activeId: null,
  checks: {},
  expandedBlocks: {},
  log: loadKey("workout-log", []),
  week: loadKey("workout-week", 1),

  stretchSeq: [],
};
let restInterval = null;
let absInterval = null;
let stretchInterval = null;

/* ================= Helpers ================= */

function beep(freq, dur) {
  freq = freq || 880; dur = dur || 0.12;
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    beep._ctx = beep._ctx || new Ctx();
    const ctx = beep._ctx;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.frequency.value = freq;
    o.type = "square";
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch (e) { /* silent */ }
}

function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
}

function daysAgo(iso) {
  const d = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
  if (d === 0) return "today";
  if (d === 1) return "yesterday";
  return d + " days ago";
}

function activeDay() {
  return DAYS.find(d => d.id === state.activeId);
}

function activeBlocks() {
  return weekVariant(state.activeId, state.week).blocks;
}

function roundTotals() {
  const blocks = activeBlocks();
  const total = blocks.reduce((s, b) => s + b.rounds, 0);
  const done = Object.values(state.checks).filter(Boolean).length;
  return { total: total, done: done };
}

/* ================= Actions ================= */

function setWeek(w) {
  state.week = w;
  saveKey("workout-week", w);
  render();
}

function startWorkout(id) {
  state.activeId = id;
  state.checks = {};
  state.expandedBlocks = {};
  state.stretchDone = false;
  state.absDone = false;
  stopRest();
  state.screen = "workout";
  render();
}

function toggleRound(b, r) {
  const key = b + "-" + r;
  state.checks[key] = !state.checks[key];
  // If this completed the block, let it collapse again
  const block = activeBlocks()[b];
  const blockDone = Array.from({ length: block.rounds }).every((_, ri) => state.checks[b + "-" + ri]);
  if (blockDone) delete state.expandedBlocks[b];
  render();
}

function startRest(secs) {
  clearInterval(restInterval);
  state.restLeft = secs;
  renderRestDock();
  restInterval = setInterval(() => {
    state.restLeft -= 1;
    if (state.restLeft <= 3 && state.restLeft > 0) beep(660, 0.08);
    if (state.restLeft <= 0) {
      stopRest();
      beep(1046, 0.25);
    }
    renderRestDock();
  }, 1000);
}

function stopRest() {
  clearInterval(restInterval);
  state.restLeft = null;
}

function stopAbsTimer() {
  clearInterval(absInterval);
  state.absRunning = false;
}

function goStretch() {
  stopRest();
  stopStretchTimer();
  state.stretchSteps = stretchStepsForDay(state.activeId);
  state.stretchSeq = buildStretchSeq(state.stretchSteps);
  state.stretchIdx = 0;
  state.stretchLeft = state.stretchSeq[0].secs;
  state.stretchRunning = false;
  state.screen = "stretch";
  render();
}

function stopStretchTimer() {
  clearInterval(stretchInterval);
  state.stretchRunning = false;
}

function stretchTick() {
  state.stretchLeft -= 1;
  if (state.stretchLeft <= 3 && state.stretchLeft > 0) beep(880, 0.06);
  if (state.stretchLeft <= 0) {
    const isWork = state.stretchSeq[state.stretchIdx].kind === "work";
    if (state.stretchIdx >= state.stretchSeq.length - 1) {
      stopStretchTimer();
      beep(1046, 0.3);
      // Stretch complete — collapse the block and return to the workout
      state.stretchDone = true;
      delete state.expandedBlocks["stretch"];
      setTimeout(() => { state.screen = "workout"; render(); }, 500);
      return;
    }
    beep(isWork ? 523 : 1046, 0.2);
    state.stretchIdx += 1;
    state.stretchLeft = state.stretchSeq[state.stretchIdx].secs;
    renderStretchTimer();
    return;
  }
  updateStretchClock();
}

function startStretchTimer() {
  clearInterval(stretchInterval);
  state.stretchRunning = true;
  stretchInterval = setInterval(stretchTick, 1000);
}

function pauseStretchTimer() {
  clearInterval(stretchInterval);
  state.stretchRunning = false;
}

function finishSession(withAbs) {
  const day = activeDay();
  const variant = weekVariant(state.activeId, state.week);
  const entry = {
    date: new Date().toISOString(),
    workout: day.name,
    abs: withAbs,
    week: state.week,
    variant: variant.label,
  };
  state.log = [entry].concat(state.log).slice(0, 300);
  saveKey("workout-log", state.log);
  state.absDone = withAbs;
  stopRest();
  stopAbsTimer();
  stopStretchTimer();
  state.screen = "done";
  render();
}

function goHome() {
  state.activeId = null;
  stopRest();
  stopAbsTimer();
  stopStretchTimer();
  state.screen = "home";
  render();
}

function goAbs() {
  stopRest();
  stopAbsTimer();
  state.absMode = "main";
  state.absIdx = 0;
  state.absLeft = WORK_SECS;
  state.absRunning = false;
  state.screen = "abs";
  render();
}

function absTick() {
  state.absLeft -= 1;
  if (state.absLeft <= 3 && state.absLeft > 0) beep(880, 0.06);
  if (state.absLeft <= 0) {
    const isWork = ABS_SEQ[state.absIdx].kind === "work";
    beep(isWork ? 523 : 1046, 0.2);
    if (state.absIdx >= ABS_SEQ.length - 1) {
      stopAbsTimer();
      setTimeout(() => finishSession(true), 400);
      return;
    }
    state.absIdx += 1;
    state.absLeft = ABS_SEQ[state.absIdx].kind === "work" ? WORK_SECS : REST_SECS;
    renderAbs();
    return;
  }
  updateAbsClock();
}

function startAbsTimer() {
  clearInterval(absInterval);
  state.absRunning = true;
  absInterval = setInterval(absTick, 1000);
}

function pauseAbsTimer() {
  clearInterval(absInterval);
  state.absRunning = false;
}

/* ================= Render ================= */

const app = document.getElementById("app");

function render() {
  if (state.screen === "home") renderHome();
  else if (state.screen === "workout") renderWorkoutScreen();
  else if (state.screen === "abs") renderAbs();
  else if (state.screen === "stretch") renderStretchTimer();
  else if (state.screen === "done") renderDone();
}

function renderHome() {
  const weekStart = new Date();
  weekStart.setHours(0, 0, 0, 0);
  weekStart.setDate(weekStart.getDate() - ((weekStart.getDay() + 6) % 7)); // Monday
  const thisWeek = state.log.filter(e => new Date(e.date) >= weekStart).length;

  const chips = [1, 2, 3, 4, 5, 6].map(w =>
    `<button class="week-chip ${w === state.week ? "week-chip-on" : ""}" data-week="${w}">${w}</button>`
  ).join("");

  const cards = DAYS.map(d => {
    const v = weekVariant(d.id, state.week);
    const last = state.log.find(e => e.workout === d.name);
    return `
      <button class="day-card" data-start="${d.id}">
        <span class="plate">${esc(d.tag)}</span>
        <span class="day-info">
          <span class="day-name">${esc(d.name)}</span>
          <span class="day-sub">${esc(d.subtitle)}</span>
          <span class="day-variant">Variant ${esc(v.label)}${v.progressed ? " · +1 round" : ""}</span>
          <span class="day-last">${last ? "Last: " + esc(daysAgo(last.date)) : "Not logged yet"}</span>
        </span>
        <span class="go" aria-hidden="true">→</span>
      </button>`;
  }).join("");

  const history = state.log.length ? `
    <section class="history">
      <h2>Recent sessions</h2>
      <ul>
        ${state.log.slice(0, 6).map(e => `
          <li>
            <span class="h-date">${esc(fmtDate(e.date))}</span>
            <span class="h-name">${esc(e.workout)}</span>
            <span class="h-var">${e.variant ? "wk" + e.week + " · " + esc(e.variant) : ""}</span>
            <span class="h-abs">${e.abs ? "+ Abs" : ""}</span>
          </li>`).join("")}
      </ul>
    </section>` : "";

  app.innerHTML = `
    <header class="masthead">
      <div class="eyebrow">Home Gym · 6-Week Program</div>
      <h1>Training<br />Log</h1>
      <div class="week-count">
        <span class="week-num">${thisWeek}</span>
        <span class="week-label">sessions<br />this week</span>
      </div>
    </header>
    <div class="week-select">
      <h2>Program week</h2>
      <div class="week-chips">${chips}</div>
      <p class="week-note">${state.week <= 3
        ? "Weeks 1–3 rotate variants A, B, C."
        : "Weeks 4–6 repeat A, B, C with an extra round on Superset A."}</p>
    </div>
    <div class="cards">${cards}</div>
    ${history}
    <p class="footnote">Tempo 3s down / 1s up · Rest 30–45s · Every session ends with 8-Minute Abs</p>
  `;

  app.querySelectorAll("[data-week]").forEach(btn =>
    btn.addEventListener("click", () => setWeek(parseInt(btn.dataset.week, 10)))
  );
  app.querySelectorAll("[data-start]").forEach(btn =>
    btn.addEventListener("click", () => startWorkout(btn.dataset.start))
  );
}

function renderWorkoutScreen() {
  const day = activeDay();
  const variant = weekVariant(state.activeId, state.week);
  const blocks = variant.blocks;
  const t = roundTotals();
  const pct = Math.round((t.done / t.total) * 100);
  const allDone = t.done === t.total;

  const blocksHtml = blocks.map((block, bi) => {
    const blockDone = Array.from({ length: block.rounds }).every((_, ri) => state.checks[bi + "-" + ri]);
    const collapsed = blockDone && !state.expandedBlocks[bi];
    const exercises = block.exercises.map(ex => {
      const desc = DESC[ex.name];
      if (!desc) {
        return `<li class="ex-item"><div class="ex-row"><span class="ex-name">${esc(ex.name)}</span><span class="ex-detail">${esc(ex.detail)}</span></div></li>`;
      }
      return `
      <li class="ex-item">
        <button class="ex-row" aria-expanded="false">
          <span class="ex-name">${esc(ex.name)} <span class="ex-q" aria-hidden="true">?</span></span>
          <span class="ex-detail">${esc(ex.detail)}</span>
        </button>
        <div class="ex-desc" hidden>${esc(desc)}</div>
      </li>`;
    }).join("");
    const rounds = Array.from({ length: block.rounds }).map((_, ri) => {
      const on = !!state.checks[bi + "-" + ri];
      return `<button class="round ${on ? "round-on" : ""}" data-toggle="${bi}-${ri}" aria-pressed="${on}"
        aria-label="${esc(block.name)} round ${ri + 1}">${on ? "✓" : ri + 1}</button>`;
    }).join("");
    const head = blockDone
      ? `<button class="block-head block-head-btn" data-blockhead="${bi}" aria-expanded="${!collapsed}">
           <h2><span class="block-check">✓</span> ${esc(block.name)}</h2>
           <span class="block-meta">${collapsed ? "complete · tap to reopen" : block.rounds + " rounds · done"}</span>
         </button>`
      : `<div class="block-head">
           <h2>${esc(block.name)}</h2>
           <span class="block-meta">${block.rounds} rounds · rest ${esc(block.rest)}</span>
         </div>`;
    return `
      <section class="block ${blockDone ? "block-done" : ""}">
        ${head}
        ${collapsed ? "" : `<ul class="ex-list">${exercises}</ul><div class="rounds">${rounds}</div>`}
      </section>`;
  }).join("");

  const stretchHtml = state.stretchDone
    ? `
    <section class="block stretch-block block-done">
      <div class="block-head stretch-head-row">
        <h2><span class="block-check">✓</span> Warm-Up Stretch</h2>
        <button class="link-btn subtle stretch-again" id="stretch-timer">Stretch again</button>
      </div>
    </section>`
    : `
    <section class="block stretch-block">
      <div class="block-head">
        <h2>Warm-Up Stretch</h2>
        <span class="block-meta">10 stretches · ~6 min</span>
      </div>
      <button class="stretch-timer-btn" id="stretch-timer">▶ Start guided stretch</button>
    </section>`;

  app.innerHTML = `
    <nav class="topbar">
      <button class="link-btn" id="back">← Back</button>
      <span class="topbar-title">${esc(day.name)}</span>
      <span class="topbar-pct">${pct}%</span>
    </nav>
    <div class="progress-rail" role="progressbar" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>
    <p class="variant-banner">Week ${state.week} · Variant <strong>${esc(variant.label)}</strong>${variant.progressed ? " · +1 round on Superset A" : ""}</p>
    ${stretchHtml}
    ${blocksHtml}
    <div class="finish-zone">
      <button class="primary ${allDone ? "" : "primary-soft"}" id="abs">
        Start 8-Minute Abs ${allDone ? "" : "(" + t.done + "/" + t.total + " rounds done)"}
      </button>
      <button class="link-btn subtle" id="skip">Skip abs &amp; finish</button>
    </div>
    <div class="rest-dock" id="rest-dock"></div>
    <div class="dock-spacer"></div>
  `;

  document.getElementById("back").addEventListener("click", goHome);
  document.getElementById("abs").addEventListener("click", goAbs);
  document.getElementById("skip").addEventListener("click", () => finishSession(false));
  app.querySelectorAll("[data-blockhead]").forEach(btn =>
    btn.addEventListener("click", () => {
      const key = btn.dataset.blockhead;
      if (state.expandedBlocks[key]) delete state.expandedBlocks[key];
      else state.expandedBlocks[key] = true;
      render();
    })
  );
  const stretchTimer = document.getElementById("stretch-timer");
  if (stretchTimer) stretchTimer.addEventListener("click", goStretch);
  app.querySelectorAll("[data-toggle]").forEach(btn =>
    btn.addEventListener("click", () => {
      const parts = btn.dataset.toggle.split("-");
      toggleRound(parts[0], parts[1]);
    })
  );
  bindExpandableRows();
  renderRestDock();
}

function bindExpandableRows() {
  app.querySelectorAll("button.ex-row, button.abs-row").forEach(btn =>
    btn.addEventListener("click", () => {
      const desc = btn.nextElementSibling;
      if (!desc) return;
      const open = !desc.hidden;
      desc.hidden = open;
      btn.setAttribute("aria-expanded", String(!open));
    })
  );
}

function fmtSecs(s) {
  if (s < 60) return String(s);
  const m = Math.floor(s / 60);
  const r = s % 60;
  return m + ":" + (r < 10 ? "0" : "") + r;
}

function renderRestDock() {
  const dock = document.getElementById("rest-dock");
  if (!dock) return;
  if (state.restLeft === null) {
    dock.innerHTML = `
      <button class="rest-btn" data-rest="30">Rest 30s</button>
      <button class="rest-btn" data-rest="45">Rest 45s</button>`;
    dock.querySelectorAll("[data-rest]").forEach(btn =>
      btn.addEventListener("click", () => startRest(parseInt(btn.dataset.rest, 10)))
    );
  } else {
    dock.innerHTML = `
      <button class="rest-btn rest-live" id="rest-cancel">
        <span class="rest-count">${fmtSecs(state.restLeft)}</span> tap to cancel
      </button>`;
    document.getElementById("rest-cancel").addEventListener("click", () => {
      stopRest();
      renderRestDock();
    });
  }
}

/* ---------- Abs screens ---------- */

function renderAbs() {
  if (state.absMode === "timer") renderAbsTimer();
  else renderAbsMain();
}

function absTopbar(rightLabel, dark) {
  const cls = dark ? " light" : "";
  return `
    <nav class="topbar">
      <button class="link-btn${cls}" id="exit">← Exit</button>
      <span class="topbar-title${cls}">8-Minute Abs</span>
      <span class="topbar-pct${cls}">${rightLabel}</span>
    </nav>`;
}

function bindExit(toMain) {
  document.getElementById("exit").addEventListener("click", () => {
    stopAbsTimer();
    if (toMain) {
      state.absMode = "main";
      render();
    } else {
      state.screen = "workout";
      render();
    }
  });
}

function renderAbsMain() {
  const rows = ABS.map((name, i) => {
    const desc = DESC[name];
    return `
      <li class="ex-item">
        <button class="ex-row" aria-expanded="false">
          <span class="ex-name"><span class="abs-num-label">${i + 1}</span> ${esc(name)} <span class="ex-q" aria-hidden="true">?</span></span>
          <span class="ex-detail">45 sec</span>
        </button>
        <div class="ex-desc" hidden>${esc(desc || "")}</div>
      </li>`;
  }).join("");

  app.innerHTML = `
    ${absTopbar("8:00", false)}
    <a class="video-link" href="${ABS_VIDEO_URL}" target="_blank" rel="noopener noreferrer">
      <span class="video-play">▶</span>
      <span class="video-link-info">
        <span class="video-link-name">Follow the video</span>
        <span class="video-link-sub">Opens your 8-minute abs video on YouTube</span>
      </span>
      <span class="go" aria-hidden="true">→</span>
    </a>
    <section class="block abs-block">
      <div class="block-head">
        <h2>The Workout</h2>
        <span class="block-meta">8 exercises · 45 sec each · ~10 sec between</span>
      </div>
      <ul class="ex-list">${rows}</ul>
    </section>
    <div class="finish-zone">
      <button class="primary primary-soft" id="start-timer">⏱ Start guided timer</button>
      <button class="primary" id="finish">Abs done — finish &amp; save</button>
    </div>
  `;
  bindExit(false);
  bindExpandableRows();
  document.getElementById("start-timer").addEventListener("click", () => {
    state.absMode = "timer";
    state.absIdx = 0;
    state.absLeft = WORK_SECS;
    state.absRunning = false;
    render();
  });
  document.getElementById("finish").addEventListener("click", () => finishSession(true));
}

function updateAbsClock() {
  const step = ABS_SEQ[state.absIdx];
  const total = step.kind === "work" ? WORK_SECS : REST_SECS;
  const ring = (state.absLeft / total) * 100;
  const clock = document.getElementById("abs-clock");
  const num = document.getElementById("abs-num");
  if (clock) clock.style.setProperty("--ring", ring + "%");
  if (num) num.textContent = state.absLeft;
}

function renderAbsTimer() {
  const step = ABS_SEQ[state.absIdx];
  const isWork = step.kind === "work";
  const total = isWork ? WORK_SECS : REST_SECS;
  const ring = (state.absLeft / total) * 100;
  const workIndex = ABS_SEQ.slice(0, state.absIdx + 1).filter(s => s.kind === "work").length;
  const nextWork = ABS_SEQ.slice(state.absIdx + 1).find(s => s.kind === "work");
  const atStart = state.absIdx === 0 && state.absLeft === WORK_SECS;

  const listItems = ABS.map((name, i) => {
    let cls = "";
    if (i + 1 < workIndex || (i + 1 === workIndex && !isWork)) cls = "abs-past";
    else if (i + 1 === workIndex) cls = "abs-now";
    return `<li class="${cls}">${esc(name)}</li>`;
  }).join("");

  app.innerHTML = `
    ${absTopbar(workIndex + "/" + ABS.length, false)}
    <div class="abs-stage">
      <div class="abs-kind">${isWork ? "WORK" : "TRANSITION"}</div>
      <div class="abs-name">${isWork ? esc(step.name) : "Get ready"}</div>
      <div class="abs-cue">${isWork ? esc(DESC[step.name] || "") : (nextWork ? "Set up for: " + esc(nextWork.name) : "")}</div>
      <div class="abs-clock" id="abs-clock" style="--ring:${ring}%"><span id="abs-num">${state.absLeft}</span></div>
      <div class="abs-next">${nextWork ? "Next: " + esc(nextWork.name) : "Last one — finish strong"}</div>
    </div>
    <div class="abs-controls">
      <button class="primary" id="playpause">${state.absRunning ? "Pause" : atStart ? "Start" : "Resume"}</button>
      <button class="link-btn subtle" id="skipstep">Skip →</button>
    </div>
    <ul class="abs-list">${listItems}</ul>
  `;

  bindExit(true);
  document.getElementById("playpause").addEventListener("click", () => {
    if (state.absRunning) pauseAbsTimer(); else startAbsTimer();
    document.getElementById("playpause").textContent = state.absRunning ? "Pause" : "Resume";
  });
  document.getElementById("skipstep").addEventListener("click", () => {
    if (state.absIdx >= ABS_SEQ.length - 1) { finishSession(true); return; }
    state.absIdx += 1;
    state.absLeft = ABS_SEQ[state.absIdx].kind === "work" ? WORK_SECS : REST_SECS;
    renderAbsTimer();
    if (state.absRunning) startAbsTimer();
  });
}

/* ---------- Guided stretch page ---------- */

function updateStretchClock() {
  const step = state.stretchSeq[state.stretchIdx];
  const ring = (state.stretchLeft / step.secs) * 100;
  const clock = document.getElementById("st-clock");
  const num = document.getElementById("st-num");
  if (clock) clock.style.setProperty("--ring", ring + "%");
  if (num) num.textContent = state.stretchLeft;
}

function renderStretchTimer() {
  const step = state.stretchSeq[state.stretchIdx];
  const isWork = step.kind === "work";
  const ring = (state.stretchLeft / step.secs) * 100;
  const workIndex = state.stretchSeq.slice(0, state.stretchIdx + 1).filter(s => s.kind === "work").length;
  const nextWork = state.stretchSeq.slice(state.stretchIdx + 1).find(s => s.kind === "work");
  const atStart = state.stretchIdx === 0 && state.stretchLeft === state.stretchSeq[0].secs;

  const listItems = state.stretchSteps.map((s, i) => {
    let cls = "";
    if (i + 1 < workIndex || (i + 1 === workIndex && !isWork)) cls = "abs-past";
    else if (i + 1 === workIndex) cls = "abs-now";
    return `<li class="${cls}">${esc(s.name)}</li>`;
  }).join("");

  app.innerHTML = `
    <nav class="topbar">
      <button class="link-btn" id="exit">← Exit</button>
      <span class="topbar-title">Warm-Up Stretch</span>
      <span class="topbar-pct">${workIndex}/${state.stretchSteps.length}</span>
    </nav>
    <div class="abs-stage">
      <div class="abs-kind">${isWork ? "STRETCH" : "GET READY"}</div>
      <div class="abs-name">${isWork ? esc(step.name) : (nextWork ? esc(nextWork.name) : "")}</div>
      <div class="abs-cue">${isWork ? esc(DESC[step.base] || "") : (nextWork ? esc(DESC[nextWork.base] || "") : "")}</div>
      <div class="abs-clock" id="st-clock" style="--ring:${ring}%"><span id="st-num">${state.stretchLeft}</span></div>
      <div class="abs-next">${isWork ? (nextWork ? "Next: " + esc(nextWork.name) : "Last one — then you lift") : "Starting in a moment…"}</div>
    </div>
    <div class="abs-controls">
      <button class="primary" id="playpause">${state.stretchRunning ? "Pause" : atStart ? "Start" : "Resume"}</button>
      <button class="link-btn subtle" id="skipstep">Skip →</button>
    </div>
    <ul class="abs-list">${listItems}</ul>
  `;

  document.getElementById("exit").addEventListener("click", () => {
    stopStretchTimer();
    state.screen = "workout";
    render();
  });
  document.getElementById("playpause").addEventListener("click", () => {
    if (state.stretchRunning) pauseStretchTimer(); else startStretchTimer();
    document.getElementById("playpause").textContent = state.stretchRunning ? "Pause" : "Resume";
  });
  document.getElementById("skipstep").addEventListener("click", () => {
    // Jump to the next stretch (skipping any buffer step)
    let next = state.stretchIdx + 1;
    while (next < state.stretchSeq.length && state.stretchSeq[next].kind !== "work") next++;
    if (next >= state.stretchSeq.length) {
      stopStretchTimer();
      state.stretchDone = true;
      delete state.expandedBlocks["stretch"];
      state.screen = "workout";
      render();
      return;
    }
    state.stretchIdx = next;
    state.stretchLeft = state.stretchSeq[next].secs;
    renderStretchTimer();
    if (state.stretchRunning) startStretchTimer();
  });
}

function renderDone() {
  const day = activeDay();
  app.innerHTML = `
    <div class="done-screen">
      <div class="done-stamp">✓</div>
      <h1 class="done-title">${esc(day.name)} logged</h1>
      <p class="done-sub">${state.absDone ? "Full session including 8-Minute Abs." : "Session saved — abs skipped this time."}</p>
      <button class="primary" id="home">Back to Training Log</button>
    </div>
  `;
  document.getElementById("home").addEventListener("click", goHome);
}

render();
</script>
</body>
</html>
